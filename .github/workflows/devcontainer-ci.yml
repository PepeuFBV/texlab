name: Devcontainer CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build Devcontainer Image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (optional, helps multi-arch)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build devcontainer image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          load: true
          tags: devcontainer-ci:latest

      - name: Quick verification inside image
        run: |
          set -e
          docker run --rm devcontainer-ci:latest bash -lc "latexmk --version"
          docker run --rm devcontainer-ci:latest bash -lc "(latexindent --version || latexindent.pl --version) && echo 'latexindent OK'"
          echo "Devcontainer image built and checks passed"
