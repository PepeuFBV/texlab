name: Release

on:
  push:
    branches:
      - main

# Only write permission needed — no PR creation required
permissions:
  contents: write

jobs:
  release:
    name: Tag and Create Release
    runs-on: ubuntu-latest

    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create_annotated_tag: true
          # only release if there is at least one conventional commit.
          default_bump: false

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  upload-templates:
    name: Upload Templates Archive
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive plain version (strip leading 'v')
        id: version
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create templates archive
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          zip -r "templates-${VERSION}.zip" templates/ templates.json
          tar -czf "templates-${VERSION}.tar.gz" templates/ templates.json

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.new_tag }}
          files: |
            templates-${{ steps.version.outputs.value }}.zip
            templates-${{ steps.version.outputs.value }}.tar.gz

  update-floating-tags:
    name: Update Floating Tags (vX and vX.Y)
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update floating vX and vX.Y tags
        env:
          TAG: ${{ needs.release.outputs.new_tag }}
        run: |
          # TAG is e.g. "v1.2.3" — derive the floating aliases
          MAJOR="${TAG%%.*}"          # "v1"
          MINOR="${TAG%.*}"           # "v1.2"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Resolve the commit the exact tag points to
          COMMIT="$(git rev-list -n 1 "$TAG")"

          # Force-update (or create) the floating tags locally and push them
          git tag -f "$MAJOR" "$COMMIT"
          git tag -f "$MINOR" "$COMMIT"

          git push origin "$MAJOR" --force
          git push origin "$MINOR" --force

          echo "Updated floating tags: $MAJOR → $COMMIT"
          echo "Updated floating tags: $MINOR → $COMMIT"
