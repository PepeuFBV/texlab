name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-templates:
    name: Upload Templates Archive
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create templates archive
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          zip -r "templates-${VERSION}.zip" templates/ templates.json
          tar -czf "templates-${VERSION}.tar.gz" templates/ templates.json

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            templates-${{ needs.release-please.outputs.version }}.zip
            templates-${{ needs.release-please.outputs.version }}.tar.gz
