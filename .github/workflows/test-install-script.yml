name: Test Installation Script

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates.json'
      - 'templates/**'
      - '.devcontainer/**'

jobs:
  test:
    name: Install Script Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install fzf
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fzf

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      # ── Syntax ──────────────────────────────────────────────────────────────
      - name: Syntax check
        run: |
          bash -n scripts/install.sh
          bash -n scripts/choose_template.sh
          bash -n scripts/validate_templates.sh
          echo "Syntax OK"

      # ── choose_template.sh ──────────────────────────────────────────────────
      - name: Chooser — non-interactive returns first template
        run: |
          selected=$(./scripts/choose_template.sh </dev/null)
          echo "Selected: $selected"
          [ -n "$selected" ] || { echo "ERROR: chooser produced no output"; exit 1; }
          [ -d "templates/$selected" ] || { echo "ERROR: templates/$selected not found"; exit 1; }
          echo "OK: templates/$selected exists"

      - name: Chooser — every path in templates.json maps to an existing directory
        run: |
          mapfile -t json_paths < <(python3 -c "
          import json, sys
          with open('templates.json') as f:
              data = json.load(f)
          root = data.get('path','').strip('/')
          for prog in data.get('programs',[]):
              pp = prog.get('path','').strip('/')
              for ver in prog.get('versions',[]):
                  vp = ver.get('path','').strip('/')
                  print('/'.join(p for p in [root,pp,vp] if p))
          ")
          [ "${#json_paths[@]}" -gt 0 ] || { echo "ERROR: no paths parsed from templates.json"; exit 1; }
          failed=0
          for p in "${json_paths[@]}"; do
            if [ -d "templates/$p" ]; then
              echo "OK: templates/$p"
            else
              echo "ERROR: templates/$p not found"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      # ── install.sh — local (normal bash script/run) mode ───────────────────
      - name: install.sh — local mode, no devcontainer
        run: |
          test_dir=$(mktemp -d)
          cd "$test_dir"
          # pipe provides: paper name on stdin; confirm defaults to Y but we
          # send "n" for devcontainer so we can test that path separately
          printf "ci-test-paper\nn\n" | bash "$GITHUB_WORKSPACE/scripts/install.sh"

          [ -d "$test_dir/ci-test-paper" ] \
            || { echo "ERROR: project directory not created"; exit 1; }
          [ -f "$test_dir/ci-test-paper/main.tex" ] \
            || { echo "ERROR: main.tex missing from project directory"; exit 1; }
          [ ! -d "$test_dir/ci-test-paper/.devcontainer" ] \
            || { echo "ERROR: .devcontainer should not be present (answered n)"; exit 1; }
          echo "OK: local mode, no devcontainer"

      - name: install.sh — local mode, with devcontainer
        run: |
          test_dir=$(mktemp -d)
          cd "$test_dir"
          printf "ci-test-paper-dc\ny\n" | bash "$GITHUB_WORKSPACE/scripts/install.sh"

          [ -d "$test_dir/ci-test-paper-dc" ] \
            || { echo "ERROR: project directory not created"; exit 1; }
          [ -f "$test_dir/ci-test-paper-dc/main.tex" ] \
            || { echo "ERROR: main.tex missing from project directory"; exit 1; }
          [ -d "$test_dir/ci-test-paper-dc/.devcontainer" ] \
            || { echo "ERROR: .devcontainer missing (answered y)"; exit 1; }
          [ -f "$test_dir/ci-test-paper-dc/.devcontainer/devcontainer.json" ] \
            || { echo "ERROR: devcontainer.json not found"; exit 1; }
          echo "OK: local mode, with devcontainer"

      - name: install.sh — rejects empty paper name
        run: |
          test_dir=$(mktemp -d)
          cd "$test_dir"
          printf "\n" | bash "$GITHUB_WORKSPACE/scripts/install.sh" && exit 1 || true
          echo "OK: empty paper name rejected"

      - name: install.sh — rejects existing directory
        run: |
          test_dir=$(mktemp -d)
          mkdir "$test_dir/existing-paper"
          cd "$test_dir"
          printf "existing-paper\n" | bash "$GITHUB_WORKSPACE/scripts/install.sh" && exit 1 || true
          echo "OK: existing directory rejected"

      # ── install.sh — pipe mode (simulates bash <(curl ...)) ────────────────
      - name: install.sh — pipe mode simulation
        run: |
          # Build a local archive of the workspace so _ensure_repo_root doesn't
          # need to reach GitHub and works against the current branch's content.
          tar -czf /tmp/texacademy-ci.tar.gz -C "$GITHUB_WORKSPACE" .

          test_dir=$(mktemp -d)
          cd "$test_dir"

          # bash <(cat ...) makes BASH_SOURCE[0] a /proc/self/fd path,
          # triggering the pipe-mode branch in install.sh.
          # TEXACADEMY_RAW_BASE: serves choose_template.sh and templates.json via file://
          # TEXACADEMY_ARCHIVE_URL: serves the repo archive via file://
          TEXACADEMY_RAW_BASE="file://$GITHUB_WORKSPACE" \
          TEXACADEMY_ARCHIVE_URL="file:///tmp/texacademy-ci.tar.gz" \
            bash <(cat "$GITHUB_WORKSPACE/scripts/install.sh") \
            <<< "pipe-mode-paper"

          [ -d "$test_dir/pipe-mode-paper" ] \
            || { echo "ERROR: project directory not created in pipe mode"; exit 1; }
          [ -f "$test_dir/pipe-mode-paper/main.tex" ] \
            || { echo "ERROR: main.tex missing in pipe mode"; exit 1; }
          [ -d "$test_dir/pipe-mode-paper/.devcontainer" ] \
            || { echo "ERROR: .devcontainer missing in pipe mode (confirm defaults to Y)"; exit 1; }
          echo "OK: pipe mode"
