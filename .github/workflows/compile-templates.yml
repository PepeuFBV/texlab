name: Compile Templates

on:
  pull_request:
    branches: [main]
    paths:
      - 'templates/**'
      - 'templates.json'

jobs:
  compile:
    name: Compile All Declared Templates
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-pictures \
            texlive-lang-portuguese \
            texlive-bibtex-extra \
            texlive-publishers

      - name: Compile each declared template
        run: |
          python3 - templates.json <<'PYEOF'
          import json, subprocess, sys, os

          with open(sys.argv[1]) as f:
              data = json.load(f)

          def strip(s):
              return s.strip("/")

          root = strip(data.get("path", ""))
          paths = []
          for prog in data.get("programs", []):
              pp = strip(prog.get("path", ""))
              for ver in prog.get("versions", []):
                  vp = strip(ver.get("path", ""))
                  paths.append("/".join(p for p in [root, pp, vp] if p))

          if not paths:
              print("ERROR: no templates found in templates.json", file=sys.stderr)
              sys.exit(1)

          failed = []
          for rel in paths:
              d = os.path.join("templates", rel)
              print(f"--- Compiling {d} ---", flush=True)
              result = subprocess.run(
                  ["latexmk", "-pdf", "-cd", "-interaction=nonstopmode",
                   "-file-line-error", "main.tex"],
                  cwd=d,
              )
              if result.returncode != 0:
                  failed.append(rel)

          if failed:
              print(f"\nFAILED templates: {failed}", file=sys.stderr)
              sys.exit(1)
          print("\nAll templates compiled successfully.")
          PYEOF
