# Docker Compose configuration for the TeX DevContainer.
#
# Resource limits are driven by .env.resources (MEM_LIMIT, CPU_LIMIT).
# docker compose v2 applies mem_limit and cpus directly at container runtime,
# which enforces real kernel cgroup limits — unlike --env-file in runArgs,
# which only injects environment variables.
#
# Codespaces note: GitHub Codespaces controls resources via machine type and
# may not honor these limits. They take full effect for local DevContainers.

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    env_file:
      - .env.resources
    mem_limit: ${MEM_LIMIT:-2g}
    cpus: '${CPU_LIMIT:-1}'
    volumes:
      - ..:/workspaces/texacademy:cached
      - ${HOME}/.codex:/home/vscode/.codex:rw

    command: sleep infinity
